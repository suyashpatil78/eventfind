<ion-content>
  <ion-refresher slot="fixed" (ionRefresh)="doRefresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>
  <ion-item>
    <ion-label>
      <h1 style="text-align: center">Leaderboard</h1>
    </ion-label>
  </ion-item>

  <ion-item *ngFor="let player of players; let i = index">
    <div class="row">
      <p><strong>{{i + 1}}</strong></p>
      <ion-avatar class="ion-avatar">
        <img src="{{ player.picture }}" id="image" />
      </ion-avatar>
      <p style="font-size: 1.15rem"><strong>{{ player.name }}</strong></p>
      <div>
        <p>{{player?.points}}</p>
        <p>💵</p>
      </div>
    </div>
  </ion-item>
</ion-content>
